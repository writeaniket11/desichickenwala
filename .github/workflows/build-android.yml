name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli



      - name: Grant Gradlew Execute Permission
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Sync Web Assets into Android
        run: npx cap sync android --verbose > cap_sync_log.txt 2>&1 || (cat cap_sync_log.txt && exit 1)

      - name: Upload Sync Log on Failure
        if: failure()
        run: |
          mkdir -p public/logs
          cp cap_sync_log.txt public/logs/cap_sync_log.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/logs/cap_sync_log.txt
          git commit -m "chore: upload capacitor sync failure log [skip ci]"
          git push
        continue-on-error: true

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK as Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesiChickenwala-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
